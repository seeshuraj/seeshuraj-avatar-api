# fly.toml - Fly.io config for seeshuraj-avatar-api
# Docs: https://fly.io/docs/reference/configuration/

app = "seeshuraj-avatar-api"
primary_region = "lhr" # London - closest free region to Dublin

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
