services:
  - type: web
    name: seeshuraj-avatar-api
    runtime: python
    plan: free
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: NVIDIA_MODEL
        value: deepseek-ai/deepseek-r1-0528-qwen3-8b
      - key: SPEECH_KEY
        sync: false
      - key: SPEECH_REGION
        value: westeurope
      - key: SPEECH_VOICE
        value: en-US-AriaNeural
      - key: ALLOWED_ORIGINS
        value: '["https://seeshuraj.github.io"]'
